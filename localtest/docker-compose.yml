services:
  backend:
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./history:/app/history
      - ../src:/app/src
      - ../config.yaml:/app/config.yaml
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
