services:
  backend:
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./history:/app/history
      - ../src:/app/src
      - ../config.yaml:/app/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 120s

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
